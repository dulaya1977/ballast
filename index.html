<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BallaSafe - Fleet Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #0056b3;
            --primary-light: #e9f2fc;
            --success: #28a745;
            --warning: #ffc107;
            --danger: #dc3545;
            --gray-100: #f8f9fa;
            --gray-200: #e9ecef;
            --text-dark: #212529;
            --shadow-sm: 0 2px 8px rgba(0, 68, 136, 0.08);
            --shadow-md: 0 4px 16px rgba(0, 68, 136, 0.12);
            --radius-md: 10px;
            --navbar-height: 60px;
        }
        body {
            background-color: var(--gray-100);
            color: var(--text-dark);
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            padding-top: var(--navbar-height); 
        }
        .top-navbar {
            height: var(--navbar-height);
            background: linear-gradient(135deg, #030b1c, #0A2463, #020612);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.6);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 2rem; position: fixed; top: 0; width: 100%; z-index: 1000;
        }
        .brand-logo {
            font-size: 1.4rem; font-weight: 700; color: #E3E3E3; text-decoration: none;
            display: flex; align-items: center; gap: 0.6rem; transition: all 0.3s;
        }
        .brand-logo:hover { color: #ffffff; text-shadow: 0 0 15px rgba(255,255,255,0.6); }
        
        .nav-links { display: flex; gap: 1rem; align-items: center; }
        .nav-links a.btn-danger { color: #fff !important; border: 1px solid var(--danger); }
        .nav-links a.btn-danger:hover { background: #c82333; box-shadow: 0 0 12px rgba(220, 53, 69, 0.6) !important; transform: translateY(-1px); }
        .nav-links a.btn-outline-light { color: #fff !important; border: 1px solid rgba(255,255,255,0.5); }
        .nav-links a.btn-outline-light:hover { background: #fff !important; color: #000 !important; }

        .page-title { text-align: center; margin: 2.5rem 0; color: var(--primary); font-weight: 600; }
        
        /* Dashboard Styles */
        .dash-card {
            background: #fff; border-radius: var(--radius-md); box-shadow: var(--shadow-sm);
            padding: 1.5rem; margin-bottom: 2rem; border-top: 4px solid var(--primary);
        }
        .dash-card.danger-border { border-top: 4px solid var(--danger); }
        .dash-title { font-size: 1.2rem; font-weight: 600; color: var(--primary); margin-bottom: 1rem; display: flex; align-items: center; gap: 0.5rem; }
        .dash-title.danger-text { color: var(--danger); }
        
        .table-hover tbody tr:hover { background-color: var(--primary-light); }
        .badge-safe { background-color: rgba(40,167,69,0.15); color: #1e7e34; padding: 0.4rem 0.8rem; border-radius: 20px; font-weight: 600; font-size: 0.85rem;}
        .badge-warn { background-color: rgba(255,193,7,0.2); color: #d39e00; padding: 0.4rem 0.8rem; border-radius: 20px; font-weight: 600; font-size: 0.85rem;}
        .badge-danger { background-color: rgba(220,53,69,0.15); color: #bd2130; padding: 0.4rem 0.8rem; border-radius: 20px; font-weight: 600; font-size: 0.85rem;}
    </style>
</head>
<body>

    <nav class="top-navbar">
        <a href="index.html" class="brand-logo">
            <i class="fa fa-shield"></i> BallaSafe
        </a>
        <div class="nav-links">
            <a href="bwm.html" class="btn btn-sm btn-outline-light fw-bold shadow-sm">
                <i class="fa fa-plus"></i> New Assessment
            </a>
            <a href="bwm2.html" class="btn btn-sm btn-danger fw-bold shadow">
                <i class="fa fa-exclamation-circle"></i> Report Failure
            </a>
        </div>
    </nav>

    <div class="container px-4">
        <h2 class="page-title">Fleet BWMC Dashboard</h2>
        
        <div class="dash-card">
            <div class="dash-title"><i class="fa fa-line-chart"></i> Recent Reliability Assessment</div>
            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead class="table-light text-muted">
                        <tr>
                            <th>Vessel Name</th>
                            <th>Destination Port</th>
                            <th>ETA</th>
                            <th>Water Grade</th>
                            <th>BWMS Function</th>
                            <th>Env Index</th>
                            <th>Dest. Port Risk</th>
                        </tr>
                    </thead>
                    <tbody id="assessTableBody">
                        <tr><td colspan="7" class="text-center text-muted py-4"><i class="fa fa-spinner fa-spin"></i> Loading data...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="dash-card danger-border">
            <div class="dash-title danger-text"><i class="fa fa-exclamation-triangle"></i> Active BWM Failure Report</div>
            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead class="table-light text-muted">
                        <tr>
                            <th>Vessel Name</th>
                            <th>Failure Time</th>
                            <th>Location</th>
                            <th>CWQ Applicability</th>
                        </tr>
                    </thead>
                    <tbody id="failTableBody">
                        <tr><td colspan="4" class="text-center text-muted py-4"><i class="fa fa-spinner fa-spin"></i> Loading data...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbxyqcwI2WYaUr5YqzSUVJDsSy7zp2VcGSZrUXVntXY-SrrnzxMWYy3YwDZ1E4HUd2hP/exec";

        document.addEventListener('DOMContentLoaded', () => {
            fetchDashboardData();
        });

        async function fetchDashboardData() {
            try {
                const response = await fetch(GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'getDashboardData' })
                });
                const data = await response.json();
                
                if (data.status === 'success') {
                    renderAssessTable(data.assessments);
                    renderFailTable(data.failures);
                }
            } catch(e) {
                console.error(e);
                document.getElementById('assessTableBody').innerHTML = '<tr><td colspan="7" class="text-center text-danger">Failed to load data. Please check your connection.</td></tr>';
                document.getElementById('failTableBody').innerHTML = '<tr><td colspan="4" class="text-center text-danger">Failed to load data. Please check your connection.</td></tr>';
            }
        }

        function getRiskBadge(risk) {
            if(!risk) return '-';
            const r = risk.toLowerCase();
            if(r.includes('normal') || r.includes('safe')) return `<span class="badge-safe">${risk}</span>`;
            if(r.includes('attention')) return `<span class="badge-warn">${risk}</span>`;
            return `<span class="badge-danger">${risk}</span>`;
        }

        function renderAssessTable(list) {
            const tbody = document.getElementById('assessTableBody');
            if(list.length === 0) { tbody.innerHTML = '<tr><td colspan="7" class="text-center">No records found.</td></tr>'; return; }
            let html = '';
            list.forEach(item => {
                html += `<tr>
                    <td class="fw-bold text-primary">${item.vessel}</td>
                    <td>${item.destPort}</td>
                    <td>${item.eta}</td>
                    <td class="fw-bold">${item.waterGrade}</td>
                    <td>${item.bwmsFunction}</td>
                    <td>${getRiskBadge(item.envIndex)}</td>
                    <td>${getRiskBadge(item.destRisk)}</td>
                </tr>`;
            });
            tbody.innerHTML = html;
        }

        function renderFailTable(list) {
            const tbody = document.getElementById('failTableBody');
            if(list.length === 0) { tbody.innerHTML = '<tr><td colspan="4" class="text-center">No active failures found.</td></tr>'; return; }
            let html = '';
            list.forEach(item => {
                html += `<tr>
                    <td class="fw-bold text-danger">${item.vessel}</td>
                    <td>${item.failureTime}</td>
                    <td>${item.location}</td>
                    <td>${item.cwq === 'Applicable' ? '<span class="badge-safe"><i class="fa fa-check"></i> Applicable</span>' : '<span class="badge-danger"><i class="fa fa-times"></i> Not Applicable</span>'}</td>
                </tr>`;
            });
            tbody.innerHTML = html;
        }
    </script>
</body>
</html>
